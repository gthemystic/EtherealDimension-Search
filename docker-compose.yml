version: '3.8'

services:
  # === Next.js Web App ===
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
        - GROQ_API_KEY=${GROQ_API_KEY:-}
        - GITHUB_PAT_TOKEN=${GITHUB_PAT_TOKEN:-}
        - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
        - NEO4J_URI=bolt://neo4j:7687
        - NEO4J_USER=neo4j
        - NEO4J_PASSWORD=etherealdimension
        - N8N_WEBHOOK_URL=http://n8n:5678
        - REDIS_URL=redis://redis:6379
    container_name: ethd-webapp
    ports:
      - "3000:3000"
    environment:
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GITHUB_PAT_TOKEN=${GITHUB_PAT_TOKEN:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=etherealdimension
      - N8N_WEBHOOK_URL=http://n8n:5678
      - REDIS_URL=redis://redis:6379
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # === Neo4j Graph Database ===
  neo4j:
    image: neo4j:5-community
    container_name: ethd-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/etherealdimension
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === n8n Multi-Agent Orchestration ===
  n8n:
    image: n8nio/n8n:latest
    container_name: ethd-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=etherealdimension
      - WEBHOOK_URL=http://n8n:5678/
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=America/New_York
      # Pass API keys to n8n so workflows can use them
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # === Redis (caching & job queues) ===
  redis:
    image: redis:7-alpine
    container_name: ethd-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  n8n_data:
  redis_data:
